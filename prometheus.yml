global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'nestjs-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['192.168.1.70:4001']
      # - targets: ['host.docker.internal:4001']
  - job_name: 'windows_exporter'
    static_configs:
      - targets: ['192.168.1.70:9182']

rule_files:
  - 'alert_rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['192.168.1.70:9093']
